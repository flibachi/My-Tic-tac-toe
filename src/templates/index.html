<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-mark">TTT</span>
                <div>
                    <h1>Tic Tac Toe</h1>
                    <p id="sessionLabel">Гость</p>
                </div>
            </div>

            <section class="panel auth-panel">
                <div class="panel-head">
                    <h2>Аккаунт</h2>
                    <span class="status-pill" id="authStatus">offline</span>
                </div>
                <form id="authForm" class="stack">
                    <label>
                        Логин
                        <input id="loginInput" autocomplete="username" required>
                    </label>
                    <label>
                        Пароль
                        <input id="passwordInput" type="password" autocomplete="current-password" required>
                    </label>
                    <div class="button-row">
                        <button type="submit" data-action="login">Войти</button>
                        <button type="button" class="secondary" id="registerButton">Создать</button>
                    </div>
                </form>
                <button type="button" class="ghost full-width" id="logoutButton">Выйти</button>
            </section>

            <section class="panel">
                <div class="panel-head">
                    <h2>Новая игра</h2>
                </div>
                <div class="stack">
                    <div class="segmented" role="group" aria-label="Режим игры">
                        <button type="button" class="active" data-mode="COMPUTER">Компьютер</button>
                        <button type="button" data-mode="MULTIPLAYER">Ожидать</button>
                    </div>
                    <label>
                        UUID соперника
                        <input id="opponentInput" placeholder="необязательно">
                    </label>
                    <button type="button" id="createGameButton">Начать игру</button>
                </div>
            </section>

            <section class="panel">
                <div class="panel-head">
                    <h2>Игры в ожидании</h2>
                    <button type="button" class="icon-button" id="refreshGamesButton" title="Обновить">↻</button>
                </div>
                <div class="waiting-list" id="waitingGames"></div>
            </section>
        </aside>

        <section class="game-area">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Текущая партия</p>
                    <h2 id="gameTitle">Партия не выбрана</h2>
                </div>
                <div class="topbar-actions">
                    <input id="gameIdInput" placeholder="UUID игры">
                    <button type="button" class="secondary" id="loadGameButton">Открыть</button>
                </div>
            </header>

            <section class="board-zone">
                <div class="board" id="board" aria-label="Игровое поле"></div>
                <div class="game-meta">
                    <div class="metric">
                        <span>Состояние</span>
                        <strong id="stateText">-</strong>
                    </div>
                    <div class="metric">
                        <span>Вы</span>
                        <strong id="youText">-</strong>
                    </div>
                    <div class="metric">
                        <span>Ход</span>
                        <strong id="turnText">-</strong>
                    </div>
                </div>
            </section>

            <section class="details-grid">
                <div class="panel">
                    <div class="panel-head">
                        <h2>Игроки</h2>
                    </div>
                    <dl class="players">
                        <dt>X</dt>
                        <dd id="playerOne">-</dd>
                        <dt>O</dt>
                        <dd id="playerTwo">-</dd>
                    </dl>
                </div>

                <div class="panel">
                    <div class="panel-head">
                        <h2>Пользователь</h2>
                    </div>
                    <div class="lookup-row">
                        <input id="userLookupInput" placeholder="UUID пользователя">
                        <button type="button" class="secondary" id="lookupUserButton">Найти</button>
                    </div>
                    <div class="user-card" id="userLookupResult">Нет данных</div>
                </div>
            </section>
        </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
